# backend/docker-compose.yml
version: "3.9"

services:
  db:
    image: postgres:16
    container_name: app_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql  # runs only on first init
    ports:
      - "127.0.0.1:5432:5432"  # not exposed publicly, localhost only

  api:
    build: .
    container_name: app_api
    restart: always
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"  # not exposed publicly, nginx proxies to this
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

volumes:
  postgres_data: